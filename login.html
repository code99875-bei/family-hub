<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Hub — 登入</title>
  <link rel="stylesheet" href="src/css/main.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      padding-bottom: 2rem;
    }

    .login-logo {
      font-size: 4rem;
      margin-bottom: 0.5rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .login-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .login-sub {
      color: var(--text-light);
      font-size: 0.88rem;
      margin-bottom: 3rem;
      text-align: center;
    }

    .login-card {
      width: 100%;
      max-width: 340px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem 1.8rem;
      text-align: center;
    }

    .login-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .login-card p {
      font-size: 0.82rem;
      color: var(--text-light);
      margin-bottom: 1.5rem;
    }

    .btn-google {
      width: 100%;
      padding: 0.8rem;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: box-shadow 0.15s, transform 0.1s;
      box-shadow: var(--shadow-sm);
    }

    .btn-google:hover { box-shadow: var(--shadow); }
    .btn-google:active { transform: scale(0.97); }

    .google-icon {
      width: 20px; height: 20px;
    }

    .member-preview {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .member-preview-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: var(--shadow-sm);
    }
  </style>
</head>
<body>
  <div class="login-logo">🏡</div>
  <h1 class="login-title">Family Hub</h1>
  <p class="login-sub">家庭管理中心</p>

  <div class="member-preview" id="memberPreview"></div>

  <div class="login-card">
    <h2>歡迎回來！</h2>
    <p>用 Google 帳號登入，馬上開始使用</p>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      使用 Google 帳號登入
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="src/js/config.js"></script>
  <script src="src/js/members.js"></script>
  <script src="src/js/auth.js"></script>
  <script>
    // 畫成員頭像預覽
    const preview = document.getElementById('memberPreview');
    MEMBER_LIST.forEach(m => {
      const el = document.createElement('div');
      el.className = 'member-preview-dot';
      el.style.background = m.color + '30';
      el.style.border = `2px solid ${m.color}`;
      el.title = m.name;
      el.textContent = m.emoji;
      preview.appendChild(el);
    });

    // 如果已登入直接跳首頁
    db.auth.getUser().then(({ data: { user } }) => {
      if (user) window.location.href = 'index.html';
    });
  </script>
</body>
</html>

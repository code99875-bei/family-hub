<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Hub — 個人財務</title>
  <link rel="stylesheet" href="src/css/main.css">
  <style>
    .account-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }
    .account-icon {
      width: 44px; height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .account-info { flex: 1; min-width: 0; }
    .account-name-row {
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .account-type-chip {
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 8px;
      background: #F0EDE8;
      color: var(--text-light);
    }
    .account-balance {
      font-size: 1.3rem;
      font-weight: 700;
      margin-top: 2px;
    }
    .emergency-badge {
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 8px;
      background: #FF6B6B20;
      color: var(--danger);
      border: 1px solid #FF6B6B40;
    }

    /* 帳戶網格 */
    .accounts-grid {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    /* 總計列 */
    .total-bar {
      background: linear-gradient(135deg, #5BB8E8, #7B5EA7);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .total-bar label {
      font-size: 0.8rem;
      opacity: 0.85;
    }
    .total-bar .val {
      font-size: 1.6rem;
      font-weight: 700;
    }

    /* 明細列 */
    .txn-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .txn-row:last-child { border-bottom: none; }
    .txn-type-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .txn-info { flex: 1; min-width: 0; }
    .txn-title {
      font-size: 0.88rem;
      font-weight: 500;
    }
    .txn-sub { font-size: 0.73rem; color: var(--text-light); margin-top: 1px; }
    .emergency-flag {
      font-size: 0.7rem;
      background: #FF6B6B20;
      color: var(--danger);
      border-radius: 6px;
      padding: 1px 5px;
      border: 1px solid #FF6B6B30;
    }

    /* 信用卡對帳 */
    .cc-summary-bar {
      background: #7B5EA710;
      border: 1px solid #7B5EA740;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }
    .cc-summary-bar label { font-size: 0.78rem; color: var(--text-light); }
    .cc-summary-bar .val { font-size: 1.1rem; font-weight: 700; color: var(--color-qun); }
  </style>
</head>
<body>

  <!-- 頁首 -->
  <div class="page-header">
    <div>
      <div class="page-title" id="pageTitle">個人財務</div>
      <div class="page-subtitle" id="pageSubtitle">載入中...</div>
    </div>
    <div style="display:flex;gap:0.5rem;">
      <button class="btn btn-ghost btn-sm" onclick="openAccountModal()">＋ 帳戶</button>
    </div>
  </div>

  <div class="content-area">

    <!-- 總計 -->
    <div class="total-bar">
      <div>
        <label>本月總餘額</label>
        <div class="val" id="grandTotal">計算中...</div>
      </div>
      <div style="font-size:2rem;">💎</div>
    </div>

    <!-- 帳戶列表 -->
    <div>
      <div style="font-size:0.75rem;font-weight:700;color:var(--text-light);margin-bottom:0.6rem;letter-spacing:0.05em;">帳戶總覽</div>
      <div class="accounts-grid" id="accountsGrid">
        <div class="loading" style="min-height:80px;"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Tab 切換 -->
    <div class="tab-bar" style="margin-top:0.5rem;">
      <button class="tab-btn active" id="ptab-txn" onclick="switchTab('txn')">收支明細</button>
      <button class="tab-btn" id="ptab-cc" onclick="switchTab('cc')">信用卡對帳</button>
    </div>

    <!-- 收支明細 -->
    <div id="ppanel-txn">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;">
        <div class="month-switcher">
          <button class="month-btn" onclick="changeMonth(-1)">‹</button>
          <span id="ymDisplay" style="font-size:0.92rem;font-weight:700;"></span>
          <button class="month-btn" onclick="changeMonth(1)">›</button>
        </div>
        <select class="form-control form-select" id="filterAccount"
          style="width:auto;padding:0.35rem 0.7rem;font-size:0.8rem;" onchange="loadTransactions()">
          <option value="">全部帳戶</option>
        </select>
      </div>
      <div class="card">
        <div id="txnList">
          <div class="loading" style="min-height:80px;"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- 信用卡對帳 -->
    <div id="ppanel-cc" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;">
        <div class="month-switcher">
          <button class="month-btn" onclick="changeCCMonth(-1)">‹</button>
          <span id="ccYmDisplay" style="font-size:0.92rem;font-weight:700;"></span>
          <button class="month-btn" onclick="changeCCMonth(1)">›</button>
        </div>
      </div>
      <div class="card">
        <div class="cc-summary-bar">
          <div><label>本月刷卡總額</label><div class="val" id="ccTotal">—</div></div>
          <div style="font-size:1.8rem;">💳</div>
        </div>
        <div id="ccList"></div>
      </div>
    </div>

  </div>

  <!-- 底部導覽 -->
  <nav class="bottom-nav">
    <a href="index.html"><span class="nav-icon">🏠</span>首頁</a>
    <a href="calendar.html"><span class="nav-icon">📅</span>行事曆</a>
    <a href="kakeibo.html"><span class="nav-icon">💰</span>家計簿</a>
    <a href="personal.html" class="active"><span class="nav-icon">👤</span>個人</a>
  </nav>

  <!-- FAB 新增收支 -->
  <button class="fab" onclick="openTxnModal()">＋</button>

  <!-- ====== 新增帳戶 Modal ====== -->
  <div id="accountModal" class="modal-overlay" style="display:none;" onclick="closeAccountModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">新增帳戶</div>
      <div class="form-group">
        <label class="form-label">帳戶名稱 <span class="req">*</span></label>
        <input class="form-control" id="accName" placeholder="例：郵局">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">類型</label>
          <select class="form-control form-select" id="accType">
            <option value="bank">🏦 存款帳戶</option>
            <option value="cash">💵 現金</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">初始金額</label>
          <input class="form-control" id="accInitial" type="number" placeholder="0">
        </div>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:0.5rem;">
        <input type="checkbox" id="accEmergency" style="width:18px;height:18px;">
        <label for="accEmergency" style="font-size:0.85rem;">🚨 這是緊急預備金帳戶</label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAccountModal()">取消</button>
        <button class="btn btn-primary" onclick="saveAccount()">新增</button>
      </div>
    </div>
  </div>

  <!-- ====== 新增收支 Modal ====== -->
  <div id="txnModal" class="modal-overlay" style="display:none;" onclick="closeTxnModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>

      <!-- 收入/支出切換 -->
      <div class="tab-bar" style="margin-bottom:1.2rem;">
        <button class="tab-btn" id="ttab-expense" onclick="setTxnType('expense')">支出</button>
        <button class="tab-btn" id="ttab-income" onclick="setTxnType('income')">收入</button>
      </div>

      <div class="form-group">
        <label class="form-label">日期 <span class="req">*</span></label>
        <input class="form-control" id="txDate" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">金額 <span class="req">*</span></label>
        <input class="form-control" id="txAmount" type="number" placeholder="0" min="0">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">付款方式 <span class="req">*</span></label>
          <select class="form-control form-select" id="txPayment" onchange="updateAccountOptions()">
            <option value="現金">💵 現金</option>
            <option value="轉帳">🔄 轉帳</option>
            <option value="信用卡刷卡">💳 信用卡刷卡</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">使用帳戶</label>
          <select class="form-control form-select" id="txAccount">
            <option value="">— 請選擇 —</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">備註</label>
        <input class="form-control" id="txNotes" placeholder="選填">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeTxnModal()">取消</button>
        <button class="btn btn-primary" onclick="saveTxn()">儲存</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="src/js/config.js"></script>
  <script src="src/js/members.js"></script>
  <script src="src/js/auth.js"></script>
  <script>
    let currentUser = null;
    let accounts = [];
    let currentYM = new Date().toISOString().slice(0, 7);
    let ccYM      = new Date().toISOString().slice(0, 7);
    let currentTab = 'txn';
    let txnType = 'expense';

    async function init() {
      const auth = await requireAuth();
      if (!auth) return;
      currentUser = auth.user;
      const member = getMember(auth.profile.member_id);
      document.getElementById('pageTitle').textContent = `${member.emoji} ${member.name} 的財務`;
      document.getElementById('pageSubtitle').textContent = '僅本人可見';
      document.getElementById('pageSubtitle').style.color = member.color;
      updateYMDisplay();
      updateCCYMDisplay();
      // 帳戶、所有交易、本月明細 三個查詢同時並行
      loadAllData();
    }

    // 所有交易快取（供帳戶餘額 + 明細共用，不重複查詢）
    let _allTxns = null;

    async function loadAllData() {
      const start = monthStart(currentYM);
      const end   = monthEnd(currentYM);

      const [accRes, allTxnRes, monthTxnRes] = await Promise.all([
        db.from('personal_accounts').select('*').eq('user_id', currentUser.id).order('display_order'),
        db.from('personal_transactions').select('account_id, type, amount').eq('user_id', currentUser.id),
        db.from('personal_transactions').select('*, personal_accounts(name)')
          .eq('user_id', currentUser.id).gte('date', start).lte('date', end)
          .order('date', { ascending: false }).order('created_at', { ascending: false }),
      ]);

      accounts = accRes.data || [];
      _allTxns = allTxnRes.data || [];

      const balMap = {};
      accounts.forEach(a => { balMap[a.id] = Number(a.initial_balance); });
      _allTxns.forEach(t => {
        if (balMap[t.account_id] === undefined) return;
        balMap[t.account_id] += t.type === 'income' ? Number(t.amount) : -Number(t.amount);
      });

      renderAccounts(balMap);
      updateAccountFilter();
      updateAccountOptions();
      renderTxns(monthTxnRes.data || []);
    }

    async function loadAccounts() {
      // 重新載入帳戶（新增/刪除後呼叫）
      const [accRes, allTxnRes] = await Promise.all([
        db.from('personal_accounts').select('*').eq('user_id', currentUser.id).order('display_order'),
        db.from('personal_transactions').select('account_id, type, amount').eq('user_id', currentUser.id),
      ]);
      accounts = accRes.data || [];
      _allTxns = allTxnRes.data || [];

      const balMap = {};
      accounts.forEach(a => { balMap[a.id] = Number(a.initial_balance); });
      _allTxns.forEach(t => {
        if (balMap[t.account_id] === undefined) return;
        balMap[t.account_id] += t.type === 'income' ? Number(t.amount) : -Number(t.amount);
      });

      renderAccounts(balMap);
      updateAccountFilter();
      updateAccountOptions();
    }

    function renderAccounts(balMap) {
      const grid = document.getElementById('accountsGrid');
      if (accounts.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-emoji">🏦</div><p>還沒有帳戶，點右上角「＋ 帳戶」新增</p></div>';
        document.getElementById('grandTotal').textContent = '$0';
        return;
      }

      let grand = 0;
      grid.innerHTML = '';
      accounts.forEach(a => {
        const bal = balMap[a.id] || 0;
        grand += bal;
        const typeLabel = a.type === 'bank' ? '存款帳戶' : '現金';
        const emergencyBadge = a.is_emergency ? '<span class="emergency-badge">🚨 緊急備用</span>' : '';
        grid.insertAdjacentHTML('beforeend', `
          <div class="account-card">
            <div class="account-icon" style="background:${bal>=0?'#5BB8E820':'#FF6B6B20'};">
              ${a.type === 'bank' ? '🏦' : '💵'}
            </div>
            <div class="account-info">
              <div class="account-name-row">
                ${a.name}
                <span class="account-type-chip">${typeLabel}</span>
                ${emergencyBadge}
              </div>
              <div class="account-balance" style="color:${bal>=0?'var(--text)':'var(--expense-color)'}">
                ${formatMoney(bal)}
              </div>
            </div>
            <button onclick="deleteAccount('${a.id}','${a.name.replace(/'/g,"\\'")}','${bal}')"
              style="background:none;border:none;color:var(--text-light);cursor:pointer;font-size:1rem;padding:4px;">🗑</button>
          </div>`);
      });
      document.getElementById('grandTotal').textContent = formatMoney(grand);
    }

    function updateAccountFilter() {
      const sel = document.getElementById('filterAccount');
      const cur = sel.value;
      sel.innerHTML = '<option value="">全部帳戶</option>';
      accounts.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.id; opt.textContent = a.name;
        if (a.id === cur) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function updateAccountOptions() {
      const payment = document.getElementById('txPayment')?.value || '';
      const sel = document.getElementById('txAccount');
      if (!sel) return;
      sel.innerHTML = '<option value="">— 請選擇 —</option>';
      accounts.filter(a => {
        if (payment === '現金') return a.type === 'cash';
        return a.type === 'bank';
      }).forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.id; opt.textContent = a.name;
        sel.appendChild(opt);
      });
    }

    async function loadTransactions() {
      const start = monthStart(currentYM);
      const end   = monthEnd(currentYM);
      const accountId = document.getElementById('filterAccount').value;

      let query = db.from('personal_transactions')
        .select('*, personal_accounts(name)')
        .eq('user_id', currentUser.id)
        .gte('date', start)
        .lte('date', end)
        .order('date', { ascending: false })
        .order('created_at', { ascending: false });

      if (accountId) query = query.eq('account_id', accountId);

      const { data: txns } = await query;
      renderTxns(txns || []);
    }

    function renderTxns(list) {
      const el = document.getElementById('txnList');
      if (list.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="empty-emoji">🌿</div><p>這個月沒有紀錄</p></div>';
        return;
      }
      el.innerHTML = list.map(t => {
        const isExpense = t.type === 'expense';
        // 找帳戶是否是緊急預備金
        const acc = accounts.find(a => a.id === t.account_id);
        const isEmergency = acc?.is_emergency && isExpense;
        const accName = t.personal_accounts?.name || '';
        return `
          <div class="txn-row" style="${isEmergency?'background:#FF6B6B08;border-radius:8px;padding-left:6px;':''}">
            <div class="txn-type-dot" style="background:${isExpense?'var(--expense-color)':'var(--income-color)'}"></div>
            <div class="txn-info">
              <div class="txn-title">
                ${t.notes || (isExpense ? '支出' : '收入')}
                ${isEmergency ? '<span class="emergency-flag">🚨 緊急備用</span>' : ''}
              </div>
              <div class="txn-sub">${fmtDate(t.date)} ・${t.payment_method}${accName?' ・'+accName:''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <div style="font-size:0.95rem;font-weight:700;color:${isExpense?'var(--expense-color)':'var(--income-color)'}">
                ${isExpense?'-':'+'} ${formatMoney(t.amount)}
              </div>
              <button onclick="deleteTxn('${t.id}')"
                style="background:none;border:none;color:var(--text-light);cursor:pointer;font-size:0.85rem;padding:0;">🗑</button>
            </div>
          </div>`;
      }).join('');
    }

    async function loadCCData() {
      const start = monthStart(ccYM);
      const end   = monthEnd(ccYM);
      const { data: txns } = await db
        .from('personal_transactions')
        .select('*, personal_accounts(name)')
        .eq('user_id', currentUser.id)
        .eq('payment_method', '信用卡刷卡')
        .eq('type', 'expense')
        .gte('date', start)
        .lte('date', end)
        .order('date', { ascending: false });

      const list = txns || [];
      const total = list.reduce((s, t) => s + Number(t.amount), 0);
      document.getElementById('ccTotal').textContent = formatMoney(total);

      const el = document.getElementById('ccList');
      if (list.length === 0) {
        el.innerHTML = '<div class="empty-state" style="padding:1rem 0;"><div class="empty-emoji">💳</div><p>這個月沒有刷卡紀錄</p></div>';
        return;
      }
      el.innerHTML = list.map(t => `
        <div class="txn-row">
          <div style="font-size:0.85rem;color:var(--text-light);min-width:36px;">${fmtDate(t.date)}</div>
          <div class="txn-info">
            <div class="txn-title">${t.notes || '刷卡支出'}</div>
            <div class="txn-sub">${t.personal_accounts?.name || ''}</div>
          </div>
          <div style="font-size:0.95rem;font-weight:700;color:var(--color-qun)">
            ${formatMoney(t.amount)}
          </div>
        </div>`).join('');
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('ptab-txn').classList.toggle('active', tab === 'txn');
      document.getElementById('ptab-cc').classList.toggle('active', tab === 'cc');
      document.getElementById('ppanel-txn').style.display = tab === 'txn' ? '' : 'none';
      document.getElementById('ppanel-cc').style.display  = tab === 'cc'  ? '' : 'none';
      if (tab === 'cc') loadCCData();
    }

    function changeMonth(delta) {
      const [y, m] = currentYM.split('-').map(Number);
      const d = new Date(y, m - 1 + delta, 1);
      currentYM = d.toISOString().slice(0, 7);
      updateYMDisplay();
      loadTransactions();
    }

    function changeCCMonth(delta) {
      const [y, m] = ccYM.split('-').map(Number);
      const d = new Date(y, m - 1 + delta, 1);
      ccYM = d.toISOString().slice(0, 7);
      updateCCYMDisplay();
      loadCCData();
    }

    function updateYMDisplay() {
      const [y, m] = currentYM.split('-');
      document.getElementById('ymDisplay').textContent = `${y}/${m}`;
    }

    function updateCCYMDisplay() {
      const [y, m] = ccYM.split('-');
      document.getElementById('ccYmDisplay').textContent = `${y}/${m}`;
    }

    // ======= 帳戶 =======
    function openAccountModal() { document.getElementById('accountModal').style.display = 'flex'; }
    function closeAccountModal() { document.getElementById('accountModal').style.display = 'none'; }

    async function saveAccount() {
      const name = document.getElementById('accName').value.trim();
      if (!name) { showToast('請輸入帳戶名稱', 'error'); return; }
      const { error } = await db.from('personal_accounts').insert({
        user_id: currentUser.id,
        name,
        type: document.getElementById('accType').value,
        initial_balance: Number(document.getElementById('accInitial').value) || 0,
        is_emergency: document.getElementById('accEmergency').checked,
        display_order: accounts.length,
      });
      if (error) { showToast('新增失敗', 'error'); return; }
      showToast('帳戶已新增 ✓', 'success');
      closeAccountModal();
      await loadAccounts();
      loadTransactions();
    }

    async function deleteAccount(id, name, bal) {
      if (!confirm(`確定刪除帳戶「${name}」？\n這將一同刪除所有相關收支紀錄。`)) return;
      await db.from('personal_transactions').delete().eq('account_id', id);
      const { error } = await db.from('personal_accounts').delete().eq('id', id);
      if (error) { showToast('刪除失敗', 'error'); return; }
      showToast('已刪除 ✓');
      await loadAccounts();
      loadTransactions();
    }

    // ======= 收支 =======
    function openTxnModal() {
      setTxnType('expense');
      document.getElementById('txDate').value = today();
      document.getElementById('txAmount').value = '';
      document.getElementById('txNotes').value = '';
      document.getElementById('txModal').style.display = 'flex';
    }

    function closeTxnModal() { document.getElementById('txModal').style.display = 'none'; }

    function setTxnType(type) {
      txnType = type;
      document.getElementById('ttab-expense').classList.toggle('active', type === 'expense');
      document.getElementById('ttab-income').classList.toggle('active', type === 'income');
    }

    async function saveTxn() {
      const date   = document.getElementById('txDate').value;
      const amount = Number(document.getElementById('txAmount').value);
      if (!date || !amount) { showToast('請填寫日期與金額', 'error'); return; }
      const { error } = await db.from('personal_transactions').insert({
        user_id: currentUser.id,
        date, amount,
        type: txnType,
        payment_method: document.getElementById('txPayment').value,
        account_id: document.getElementById('txAccount').value || null,
        notes: document.getElementById('txNotes').value.trim() || null,
      });
      if (error) { showToast('儲存失敗', 'error'); return; }
      showToast('已儲存 ✓', 'success');
      closeTxnModal();
      await loadAccounts();
      loadTransactions();
    }

    async function deleteTxn(id) {
      if (!confirm('確定刪除這筆紀錄？')) return;
      const { error } = await db.from('personal_transactions').delete().eq('id', id);
      if (error) { showToast('刪除失敗', 'error'); return; }
      showToast('已刪除 ✓');
      await loadAccounts();
      loadTransactions();
    }

    init();
  </script>
</body>
</html>
